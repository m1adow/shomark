services:
  worker:
    build: ../../../worker
    depends_on:
      - kafka
      - minio
      - ollama
    environment:
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=video-processing
      - KAFKA_COMPLETION_TOPIC=video-processing-completed
      - KAFKA_GROUP_ID=worker-group
      - KAFKA_MAX_POLL_INTERVAL_MS=1800000   # 30 minutes — enough for long videos
      - KAFKA_SESSION_TIMEOUT_MS=60000        # 60 seconds heartbeat timeout
      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      # Ollama
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    volumes:
      # Map the current directory on your host to /app in the container
      - ../../../worker:/app
    # Optional: If you have an NVIDIA GPU, uncomment the lines below to make Whisper 10x faster
    deploy:
      replicas: ${WORKER_REPLICAS}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]